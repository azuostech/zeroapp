<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackson Souza — Finanças do Zero</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #181818;
  --border: #222;
  --green: #00C853;
  --green-dim: rgba(0,200,83,0.1);
  --green-glow: rgba(0,200,83,0.2);
  --text: #f0f0f0;
  --muted: #555;
  --dim: #888;
  --red: #FF4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── FUNDO COM GRADE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,83,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,83,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* ── BRILHO DE FUNDO ── */
.bg-glow {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,83,0.06) 0%, transparent 70%);
  pointer-events: none;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: breathe 6s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
}

/* ── CARD PRINCIPAL ── */
.card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 20px;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── LOGO / MARCA ── */
.brand {
  text-align: center;
  margin-bottom: 36px;
}
.brand-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--green-dim);
  border: 1px solid rgba(0,200,83,0.25);
  margin-bottom: 16px;
  font-size: 24px;
}
.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.brand-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── FORM BOX ── */
.form-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  backdrop-filter: blur(10px);
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  background: var(--bg3);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 9px;
  font-size: 13px;
  font-weight: 500;
  color: var(--dim);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.tab.active {
  background: var(--bg2);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

/* ── FORM ── */
.form-group { margin-bottom: 16px; }

label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 7px;
}

input[type=text],
input[type=email],
input[type=password] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus {
  border-color: rgba(0,200,83,0.4);
  box-shadow: 0 0 0 3px rgba(0,200,83,0.07);
}
input::placeholder { color: var(--muted); }

/* ── BOTÃO PRINCIPAL ── */
.btn-main {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 10px;
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 13px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.3px;
}
.btn-main:hover { background: #00df5e; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,200,83,0.25); }
.btn-main:active { transform: translateY(0); }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── LOADING SPINNER ── */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MENSAGEM DE ERRO / SUCESSO ── */
.msg {
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
.msg.error { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.25); color: #ff8080; display: block; }
.msg.success { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.25); color: var(--green); display: block; }

/* ── PENDING STATE ── */
.pending-box {
  text-align: center;
  padding: 20px 0;
  display: none;
}
.pending-icon { font-size: 40px; margin-bottom: 12px; }
.pending-title { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 8px; }
.pending-text { font-size: 13px; color: var(--dim); line-height: 1.6; }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0;
  color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── RODAPÉ ── */
.footer-note {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="card">
  <div class="brand">
    <div class="brand-mark">💚</div>
    <div class="brand-name">Jackson Souza</div>
    <div class="brand-sub">Finanças do Zero</div>
  </div>

  <div class="form-box">
    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Criar conta</div>
    </div>

    <!-- MENSAGEM -->
    <div class="msg" id="msg"></div>

    <!-- FORMULÁRIO LOGIN -->
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-main" id="btn-login">Entrar</button>
    </form>

    <!-- FORMULÁRIO CADASTRO -->
    <form id="form-signup" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="signup-name" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="signup-email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Telefone / WhatsApp</label>
        <input type="text" id="signup-phone" placeholder="(47) 99999-9999">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn-main" id="btn-signup">Criar conta</button>
    </form>

    <!-- AGUARDANDO APROVAÇÃO -->
    <div class="pending-box" id="pending-box">
      <div class="pending-icon">⏳</div>
      <div class="pending-title">Cadastro realizado!</div>
      <div class="pending-text">Sua conta está em análise. Em breve você receberá uma confirmação e poderá acessar a plataforma.</div>
    </div>
  </div>

  <div class="footer-note">
    Plataforma exclusiva · Jackson Souza · Método Finanças do Zero
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ══════════════════════════════════════════
// ⚙️  CONFIGURE AQUI
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://nmjptuaukoyfurnbbczc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lfP31zfuXGO1H_4s9fLZtA_64UYcm8t';
// ══════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Checar sessão existente
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await redirectByRole(session.user);
})();

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('pending-box').style.display = 'none';
  clearMsg();
}

// ── LOGIN ──
async function handleLogin(e) {
  e.preventDefault();
  const email = v('login-email'), password = v('login-password');
  setLoading('btn-login', true);
  clearMsg();

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showMsg(translateError(error.message), 'error'); setLoading('btn-login', false); return; }

  // Checar status do perfil
  const { data: profile } = await sb.from('profiles').select('status, role').eq('id', data.user.id).single();
  if (!profile || profile.status === 'pending') {
    await sb.auth.signOut();
    showMsg('Sua conta ainda está aguardando aprovação. Entraremos em contato em breve.', 'error');
    setLoading('btn-login', false);
    return;
  }
  if (profile.status === 'disabled') {
    await sb.auth.signOut();
    showMsg('Sua conta foi desativada. Entre em contato com o suporte.', 'error');
    setLoading('btn-login', false);
    return;
  }

  await redirectByRole(data.user);
}

// ── CADASTRO ──
async function handleSignup(e) {
  e.preventDefault();
  const name = v('signup-name'), email = v('signup-email');
  const phone = v('signup-phone'), password = v('signup-password');
  setLoading('btn-signup', true);
  clearMsg();

  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name, phone } }
  });

  if (error) { showMsg(translateError(error.message), 'error'); setLoading('btn-signup', false); return; }

  // Mostrar tela de aguardo
  document.getElementById('form-signup').style.display = 'none';
  document.getElementById('pending-box').style.display = 'block';
  setLoading('btn-signup', false);
}

// ── REDIRECT POR ROLE ──
async function redirectByRole(user) {
  const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
  if (profile?.role === 'admin') window.location.href = 'admin.html';
  else window.location.href = 'app.html';
}

// ── UTILS ──
function v(id) { return document.getElementById(id).value.trim(); }
function clearMsg() { const el=document.getElementById('msg'); el.className='msg'; el.textContent=''; }
function showMsg(txt, type) { const el=document.getElementById('msg'); el.className=`msg ${type}`; el.textContent=txt; }
function setLoading(btnId, on) {
  const btn=document.getElementById(btnId);
  btn.disabled=on;
  btn.innerHTML = on ? '<span class="spinner"></span> Aguarde...' : (btnId==='btn-login' ? 'Entrar' : 'Criar conta');
}
function translateError(msg) {
  if (msg.includes('Invalid login')) return 'E-mail ou senha incorretos.';
  if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail antes de entrar.';
  if (msg.includes('already registered')) return 'Este e-mail já está cadastrado.';
  if (msg.includes('Password should')) return 'A senha deve ter pelo menos 6 caracteres.';
  return msg;
}
</script>
</body>
</html>
